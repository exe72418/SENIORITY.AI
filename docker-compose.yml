version: '3.8'

services:
  mcp-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway" # PERMITE HABLAR CON TU PC REAL
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    networks:
      - seniority-network

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3001:3000"
    volumes:
      - ./web-ui:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - WATCHPACK_POLLING=true
    networks:
      - seniority-network
    depends_on:
      - mcp-core

networks:
  seniority-network:
    driver: bridge
